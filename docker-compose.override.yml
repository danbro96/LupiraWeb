services:
  backend:
    build:
      context: .
      dockerfile: LupiraWeb.Server/Dockerfile
      target: final
    container_name: lupiraweb-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5188:80"
    volumes:
      - lupira-db-dev:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 20
    networks:
      - lupira-net

  frontend:
    image: node:24
    container_name: lupiraweb-frontend-dev
    working_dir: /app
    volumes:
      - ./lupiraweb.client:/app:cached
      - /app/node_modules
    command: ["sh", "-c", "npm ci && npm run dev"]
    environment:
      - API_BASE_URL=http://backend:80
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lupira-net

networks:
  lupira-net:
    driver: bridge

volumes:
  lupira-db-dev:
