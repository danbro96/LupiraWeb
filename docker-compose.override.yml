services:
  postgres:
    image: postgres:17-alpine
    container_name: lupiraweb-postgres-dev
    environment:
      POSTGRES_DB: lupiraweb
      POSTGRES_USER: lupira
      POSTGRES_PASSWORD: lupira
    ports:
      - "5432:5432"
    volumes:
      - lupira-pg-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lupira -d lupiraweb"]
      interval: 5s
      timeout: 2s
      retries: 20
    networks:
      - lupira-net

  backend:
    build:
      context: .
      dockerfile: LupiraWeb.Server/Dockerfile
      target: final
    container_name: lupiraweb-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__AppDb=Host=postgres;Port=5432;Database=lupiraweb;Username=lupira;Password=lupira
    ports:
      - "5188:80"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 20
    networks:
      - lupira-net

  frontend:
    image: node:24
    container_name: lupiraweb-frontend-dev
    working_dir: /app
    volumes:
      - ./lupiraweb.client:/app:cached
      - /app/node_modules
    command: ["sh", "-c", "npm ci && npm run dev"]
    environment:
      - API_BASE_URL=http://backend:80
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lupira-net

networks:
  lupira-net:
    driver: bridge

volumes:
  lupira-pg-dev:
