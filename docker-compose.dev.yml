version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: LupiraWeb.Server/Dockerfile
      target: final
    container_name: lupiraweb-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5188:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/weatherforecast || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 20
    networks:
      - lupira-net

  frontend:
    image: node:20
    container_name: lupiraweb-frontend-dev
    working_dir: /app
    volumes:
      - ./lupiraweb.client:/app:cached
      - /app/node_modules
    # start frontend immediately; Vite proxy will forward `/api` to backend when available
    command: ["sh", "-c", "npm ci && npm run dev -- --host"]
    environment:
      - VITE_DEV_API=http://backend:80
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lupira-net

networks:
  lupira-net:
    driver: bridge