# Local development stack. Pairs with docker-compose.override.yml for live-mount + hot reload.
# Production on TrueNAS uses the split stacks under deploy/db/ and deploy/web/, not this file.
services:
  postgres:
    image: postgres:17-alpine
    container_name: lupira-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lupiraweb}
      POSTGRES_USER: ${POSTGRES_USER:-lupira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - lupira-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lupira} -d ${POSTGRES_DB:-lupiraweb}"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    image: danbro96/lupiraweb-backend:latest
    container_name: backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AppDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-lupiraweb};Username=${POSTGRES_USER:-lupira};Password=${POSTGRES_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    image: danbro96/lupiraweb-frontend:latest
    container_name: frontend
    environment:
      API_BASE_URL: http://backend:80
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Opt-in: start with `docker compose --profile admin up`.
  admin-backend:
    image: danbro96/lupiraweb-admin-backend:latest
    container_name: admin-backend
    profiles: ["admin"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AppDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-lupiraweb};Username=${POSTGRES_USER:-lupira};Password=${POSTGRES_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  lupira-pg:
