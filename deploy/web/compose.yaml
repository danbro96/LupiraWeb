services:
  backend:
    image: danbro96/lupiraweb-backend:${IMAGE_TAG:-latest}
    container_name: lupira-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__AppDb: Host=${POSTGRES_HOST:-postgres};Port=5432;Database=${POSTGRES_DB:?POSTGRES_DB is required};Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod,host.name=medelynas}
      Demos__Chat__BaseUrl: ${DEMOS_CHAT_BASE_URL:?DEMOS_CHAT_BASE_URL is required}
      Demos__Chat__ApiKey: ${DEMOS_CHAT_API_KEY:-}
      Demos__TextToSpeech__BaseUrl: ${DEMOS_TTS_BASE_URL:?DEMOS_TTS_BASE_URL is required}
      Demos__TextToSpeech__ApiKey: ${DEMOS_TTS_API_KEY:-}
      Demos__Vision__BaseUrl: ${DEMOS_VISION_BASE_URL:?DEMOS_VISION_BASE_URL is required}
      Demos__Vision__ApiKey: ${DEMOS_VISION_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-40081}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 60s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - medelynas_data
      - medelynas_telemetry
      - lupira_web

  frontend:
    image: danbro96/lupiraweb-frontend:${IMAGE_TAG:-latest}
    container_name: lupira-frontend
    environment:
      API_BASE_URL: http://backend:80
    ports:
      - "${FRONTEND_PORT:-40080}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lupira_web

networks:
  medelynas_data:
    external: true
    name: medelynas_data
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
  lupira_web:
    driver: bridge
