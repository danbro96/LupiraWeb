# DEPRECATED: this file documents the legacy bundled-DB pattern.
# Production now uses the platform Postgres (`medelynas-db`) shared across MedelyNAS apps.
# See: docs/CICD.md and ../../DevOps/Guides/shared-postgres-platform.md
#
# Do NOT deploy this alongside the platform DB. Kept here as a reference until
# the platform pattern is proven, then deletable.

services:
  postgres:
    image: postgres:17-alpine
    container_name: lupira-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - lupira_data

volumes:
  pgdata:

networks:
  lupira_data:
    name: lupira_data
    driver: bridge
